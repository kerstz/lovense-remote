name: Release APK

# Build et signe l'APK release à chaque tag v*, et l'attache à la GitHub Release.
# Secrets requis (Settings → Secrets → Actions) :
#   SIGNING_KEYSTORE_BASE64  = base64 d'un keystore .jks (base64 -w0 keystore.jks)
#   SIGNING_STORE_PASSWORD, SIGNING_KEY_ALIAS, SIGNING_KEY_PASSWORD

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Decode keystore
        env:
          KS_B64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/keystore.jks"
            echo "KS=$RUNNER_TEMP/keystore.jks" >> "$GITHUB_ENV"
          fi

      - name: Build release APK
        env:
          SIGNING_KEYSTORE_FILE: ${{ env.KS }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Attach APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
