AutoName: Lovense Remote
Summary: Direct-Bluetooth remote for Lovense toys
Description: |-
  Control Lovense toys directly over Bluetooth LE, without the Lovense app, an account, or the cloud.

  Features:

  * Multi-toy: the UI adapts to each toy's actuators (vibration, dual motor, rotation, suction).
  * One-hand XY pad for two-motor toys; intensity presets; patterns; a random Tease mode and a record mode.
  * Remote control by link, on the same Wi-Fi or over the internet, gated by a per-session PIN with an accept/refuse prompt and auto-expiry.
  * Keeps the connection alive in the background, plus a quick-settings STOP tile.
  * French / English / Spanish; dark and light themes.
  * 100% AOSP, no Google Play Services.

  Internet sharing routes traffic through localhost.run (a third party). Not affiliated with Lovense.

